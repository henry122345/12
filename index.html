<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bienvenidos a mi Bautizo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(180deg,#001d5a,#b30000);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

/* Arañas */
.spider{
    position:absolute;
    font-size:35px;
    animation:caer linear infinite;
}

.spider:nth-child(1){
    left:10%;
    animation-duration:8s;
}

.spider:nth-child(2){
    left:30%;
    animation-duration:10s;
}

.spider:nth-child(3){
    left:55%;
    animation-duration:7s;
}

.spider:nth-child(4){
    left:80%;
    animation-duration:9s;
}

@keyframes caer{
    0%{
        transform:translateY(-150px);
    }
    100%{
        transform:translateY(110vh);
    }
}

.card{
    position:relative;
    z-index:2;
    width:90%;
    max-width:380px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:25px;
    text-align:center;
    color:white;
}

.card img{
    width:220px;
    border-radius:15px;
    margin-bottom:20px;
    animation:flotar 3s infinite ease-in-out;
}

@keyframes flotar{
    50%{
        transform:translateY(-10px);
    }
}

h1{
    color:#FFD700;
    margin-bottom:15px;
}

p{
    line-height:1.6;
    margin-bottom:20px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#e60023;
    color:white;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="spider">🕷️</div>
<div class="spider">🕷️</div>
<div class="spider">🕷️</div>
<div class="spider">🕷️</div>

<div class="card">

<img src="spiderman.png" alt="Spider-Man">

<h1>🕷️ ¡Bienvenidos a mi Bautizo! 🕷️</h1>

<p>
Nos llena de alegría que nos acompañes en este día tan especial.
<br><br>
¡Gracias por ser parte de este hermoso momento!
</p>

<button onclick="alert('¡Bienvenidos!')">
Entrar
</button>

</div>

</body>
</html>
